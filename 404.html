<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ページが見つかりません｜マイクラ コマンドずかん</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=M+PLUS+Rounded+1c:wght@500;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      background-color: #110000;
      color: #ff2222;
      font-family: 'M PLUS Rounded 1c', sans-serif;
      text-align: center;
      padding: 10% 5%;
      margin: 0;
      overflow: hidden;
    }
    h1 {
      font-family: 'DotGothic16', sans-serif;
      font-size: 64px;
      color: #ff3333;
      text-shadow: 0 0 10px rgba(255, 0, 0, 0.7);
      margin-bottom: 20px;
    }
    p {
      color: #cccccc;
      font-size: 18px;
      margin-bottom: 40px;
    }
    .btn {
      display: inline-block;
      background-color: #22c55e;
      color: #110000;
      font-family: 'DotGothic16', sans-serif;
      font-weight: bold;
      text-decoration: none;
      padding: 12px 30px;
      font-size: 20px;
      border: 3px solid #ffffff;
      border-radius: 4px;
      transition: background-color 0.2s, transform 0.2s;
    }
    .btn:hover {
      background-color: #16a34a;
      transform: scale(1.05);
    }
    .steve-tomb {
      font-size: 80px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="steve-tomb">☠️</div>
  <h1>ゲームオーバー！</h1>
  <p>おっと！さがそうとしたページは、クリーパーに爆破されたか、まだ作られていないみたい。</p>
  
  <a href="/MC_BE_Command/" class="btn">リスポーン (ホームにもどる)</a>
</body>
</html>
